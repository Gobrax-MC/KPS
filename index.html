
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
:root{--y:#F5C518;--yd:#C9A000;--bg:#F7F5EF;--white:#fff;--dark:#1A1A1A;--gray:#6B6B6B;--lgray:#E8E6DF;--red:#E53935;--green:#2E7D32;--amber:#E65100}
body{background:var(--bg);color:var(--dark);font-size:14px}
.app{display:flex;height:700px;overflow:hidden;border-radius:12px;border:1px solid #ddd;position:relative}
/* SIDEBAR */
.sb{width:210px;flex-shrink:0;background:var(--dark);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #333}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-icon{width:34px;height:34px;border-radius:8px;background:var(--y);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:var(--dark)}
.sb-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.3px}
.sb-sub{font-size:10px;color:#888;margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-section{font-size:9px;font-weight:700;color:#555;letter-spacing:.1em;text-transform:uppercase;padding:10px 8px 4px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:8px;border:none;background:none;color:#aaa;font-size:12.5px;font-weight:500;cursor:pointer;text-align:left;transition:.15s;margin-bottom:1px}
.nav-btn:hover{background:#2a2a2a;color:#fff}
.nav-btn.active{background:var(--y);color:var(--dark);font-weight:700}
.nav-btn i{font-size:15px;width:16px;flex-shrink:0}
.sb-user{padding:12px 14px;border-top:1px solid #333}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--y);color:var(--dark);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.sb-uname{font-size:12px;font-weight:600;color:#fff}
.sb-urole{font-size:10px;color:#888}
.logout{margin-top:6px;font-size:11px;color:#666;background:none;border:none;cursor:pointer;padding:0;text-align:left}
.logout:hover{color:#aaa}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}
.topbar{background:var(--white);border-bottom:1px solid var(--lgray);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:700;color:var(--dark)}
.content{flex:1;overflow-y:auto;padding:18px}
/* PAGES */
.page{display:none}.page.on{display:block}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid #ddd;background:var(--white);color:var(--dark);transition:.15s}
.btn:hover{background:#f5f5f5}
.btn-y{background:var(--y);border-color:var(--y);color:var(--dark)}
.btn-y:hover{background:var(--yd);border-color:var(--yd)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--gray)}
.btn-ghost:hover{background:var(--lgray);color:var(--dark)}
.btn-red{background:#fdecea;border-color:#f5c6c2;color:var(--red)}
/* CARDS */
.card{background:var(--white);border-radius:14px;border:1.5px solid var(--lgray);overflow:hidden}
.card-p{padding:16px}
/* AREA CARDS - like the reference image */
.area-card{background:var(--white);border-radius:16px;border:2px solid var(--lgray);padding:18px;transition:.15s;cursor:pointer}
.area-card:hover{border-color:var(--y);box-shadow:0 4px 16px rgba(245,197,24,.15)}
.area-card-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed var(--lgray)}
.area-icon-circle{width:44px;height:44px;border-radius:50%;background:var(--y);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.area-card-title{font-size:17px;font-weight:800;color:var(--dark)}
.area-card-badge{font-size:10px}
.kpi-line{display:flex;align-items:baseline;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f5f5f0}
.kpi-line:last-child{border-bottom:none}
.kpi-label{font-size:12px;color:#555;flex:1;padding-right:8px}
.kpi-value{font-size:12.5px;font-weight:700;color:var(--y);text-align:right;flex-shrink:0}
.kpi-value.green{color:#2E7D32}
.kpi-value.red{color:#C62828}
.kpi-value.gray{color:#999}
.focus-box{background:#fffbea;border-radius:8px;border:1px dashed var(--y);padding:10px 12px;margin-top:12px;display:flex;gap:10px}
.focus-icon{font-size:18px;flex-shrink:0}
.focus-label{font-size:11px;font-weight:700;color:var(--yd);margin-bottom:2px}
.focus-text{font-size:11.5px;color:#555;line-height:1.4}
/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10.5px;font-weight:700;border:1px solid}
.b-green{background:#e8f5e9;color:#2E7D32;border-color:#a5d6a7}
.b-yellow{background:#fffde7;color:#F57F17;border-color:var(--y)}
.b-red{background:#ffebee;color:#C62828;border-color:#ef9a9a}
.b-blue{background:#e3f2fd;color:#1565C0;border-color:#90caf9}
.b-gray{background:#f5f5f5;color:#757575;border-color:#e0e0e0}
/* PROGRESS */
.prog-wrap{margin:6px 0}
.prog-bar{height:7px;background:#eee;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
/* STATS ROW */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:var(--white);border-radius:12px;border:1.5px solid var(--lgray);padding:12px 14px}
.stat-box-label{font-size:10.5px;color:var(--gray);margin-bottom:4px;font-weight:500}
.stat-box-val{font-size:22px;font-weight:800;color:var(--dark)}
/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1.5px solid var(--lgray)}
table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--white)}
th{padding:9px 12px;background:#fafaf8;font-size:10.5px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--lgray);text-align:left;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f5f5f0;color:var(--dark);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
/* FORM */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11.5px;font-weight:700;color:var(--gray);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid var(--lgray);border-radius:8px;font-size:13px;background:var(--white);color:var(--dark);outline:none;transition:.15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--y)}
.fg textarea{resize:vertical;min-height:70px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* LOGIN */
.login-wrap{display:flex;width:100%;height:100%}
.login-left{width:220px;background:var(--dark);padding:28px 22px;display:flex;flex-direction:column;justify-content:space-between;flex-shrink:0}
.login-right{flex:1;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--white);border-radius:16px;border:2px solid var(--lgray);padding:28px;width:100%;max-width:300px}
.login-card h2{font-size:20px;font-weight:800;margin-bottom:3px}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:14px}
.qbtn{padding:6px 8px;border-radius:7px;border:1.5px solid var(--lgray);background:var(--white);font-size:11px;color:var(--gray);cursor:pointer;text-align:left;font-weight:600;transition:.15s}
.qbtn:hover{border-color:var(--y);color:var(--dark);background:#fffbea}
/* MODAL */
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--white);border-radius:16px;width:100%;max-width:460px;max-height:85%;display:flex;flex-direction:column;border:2px solid var(--lgray)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--lgray);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:15px;font-weight:800}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray);line-height:1}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--lgray);display:flex;justify-content:flex-end;gap:8px}
/* KPI SEMANAIS page */
.kpis-header{background:var(--white);border-radius:14px;border:2px solid var(--lgray);padding:16px 20px;margin-bottom:16px}
.kpis-logo-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.kpis-brand-name{font-size:24px;font-weight:900;color:var(--dark);letter-spacing:-1px}
.kpis-brand-gb{font-size:24px;font-weight:900;color:var(--y);letter-spacing:-1px}
.kpis-subtitle{font-size:11px;color:var(--gray);margin-top:1px}
.objetivo-box{background:#fffbea;border:1.5px solid var(--y);border-radius:10px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;margin-top:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
/* Msg */
.msg{padding:10px 14px;border-radius:8px;font-size:12.5px;font-weight:600;margin-bottom:12px}
.msg-ok{background:#e8f5e9;color:#2E7D32;border:1px solid #a5d6a7}
.msg-err{background:#ffebee;color:#C62828;border:1px solid #ef9a9a}
/* Section label */
.sec-lbl{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.page-title{font-size:20px;font-weight:800;color:var(--dark);margin-bottom:3px}
.page-sub{font-size:12px;color:var(--gray);margin-bottom:16px}
.inline-edit{cursor:pointer;border-bottom:1px dashed var(--y);color:var(--dark)}
.inline-edit:hover{color:var(--yd)}
/* Locked */
.locked-bar{background:#fffde7;border:1px solid var(--y);border-radius:8px;padding:9px 14px;font-size:12px;color:#7B5E00;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dot-status{width:8px;height:8px;border-radius:50%;display:inline-block}
</style>

// ============ HELPERS ============
function pct(meta,real,type){if(!meta||meta==0)return 0;return type==='maior'?Math.round((real/meta)*100):Math.round((meta/real)*100);}
function st(meta,real,type){if(!meta)return'gray';if(type==='maior'){const p=pct(meta,real,type);return p>=100?'green':p>=80?'yellow':'red';}else{if(real<=meta)return'green';return((real-meta)/meta)*100<=20?'yellow':'red';}}
function stColor(s){return s==='green'?'#2E7D32':s==='yellow'?'#F57F17':'#C62828';}
function stBg(s){return s==='green'?'#e8f5e9':s==='yellow'?'#fffde7':'#ffebee';}
function bdg(s){const m={approved:'b-green',pending_approval:'b-blue',pending:'b-gray',returned:'b-yellow',draft:'b-gray',green:'b-green',yellow:'b-yellow',red:'b-red','no-data':'b-gray',open:'b-blue',published:'b-green'};const l={approved:'✓ Aprovado',pending_approval:'⏳ Enviado',pending:'○ Pendente',returned:'↩ Devolvido',draft:'✎ Rascunho',green:'● Na meta',yellow:'● Atenção',red:'● Crítico','no-data':'— Sem dados',open:'Aberta',published:'Publicada'};return`<span class="badge ${m[s]||'b-gray'}">${l[s]||s}</span>`;}
function getAreaSt(wid,aid){const r=(RESULTS[wid]||{})[aid];if(!r)return'pending';return r.status;}
function getKpisSt(wid,aid){const r=(RESULTS[wid]||{})[aid];if(!r||!r.kpis)return'no-data';const ks=KPIS.filter(k=>k.area===aid&&k.active);const ss=ks.map(k=>{const v=r.kpis[k.id];if(!v)return null;return st(v.meta,v.real,k.type);}).filter(Boolean);if(!ss.length)return'no-data';if(ss.includes('red'))return'red';if(ss.includes('yellow'))return'yellow';return'green';}
function getAvgPct(wid,aid){const r=(RESULTS[wid]||{})[aid];if(!r||!r.kpis)return 0;const ks=KPIS.filter(k=>k.area===aid&&k.active);const ps=ks.map(k=>{const v=r.kpis[k.id];if(!v)return null;return pct(v.meta,v.real,k.type);}).filter(v=>v!==null);if(!ps.length)return 0;return Math.round(ps.reduce((a,b)=>a+b,0)/ps.length);}
function getMetaForKpi(wid,aid,kid){const mg=(METAS_GLOBAIS[wid]||{})[aid]||{};if(mg[kid]!==undefined)return mg[kid];const r=(RESULTS[wid]||{})[aid];if(r&&r.kpis&&r.kpis[kid])return r.kpis[kid].meta;return'';}
function fmt(v){if(v===undefined||v===null||v==='')return'—';if(typeof v==='number'&&!Number.isInteger(v))return v.toFixed(1);return v;}

function calcKpiPreview(kid,type){
  const t=parseFloat(document.getElementById('t_'+kid)?.value);
  const a=parseFloat(document.getElementById('a_'+kid)?.value);
  const el=document.getElementById('kc_'+kid);if(!el)return;
  if(isNaN(t)||isNaN(a)||!t){el.innerHTML='';return;}
  const p=pct(t,a,type);const s=st(t,a,type);
  el.innerHTML=`<div style="display:flex;align-items:center;gap:8px">
    <div class="prog-bar" style="flex:1"><div class="prog-fill" style="width:${Math.min(100,p)}%;background:${stColor(s)}"></div></div>
    <span style="font-size:12px;font-weight:800;color:${stColor(s)}">${p}%</span>${bdg(s)}
  </div>`;
}
function saveFill(isDraft){
  const aid=CU.area;const ks=KPIS.filter(k=>k.area===aid&&k.active);
  const kpis={};let has=false;
  ks.forEach(k=>{
    const t=parseFloat(document.getElementById('t_'+k.id)?.value);
    const a=parseFloat(document.getElementById('a_'+k.id)?.value);
    if(!isNaN(t)&&!isNaN(a)){kpis[k.id]={meta:t,real:a};has=true;}
  });
  if(!has){showMsg('fill-msg','err','Preencha ao menos um KPI antes de enviar.');return;}
  if(!RESULTS[CW])RESULTS[CW]={};
  RESULTS[CW][aid]={
    status:isDraft?'draft':'pending_approval',
    foco:document.getElementById('f-foco')?.value||'',
    comentario:document.getElementById('f-com')?.value||'',
    risco:document.getElementById('f-risco')?.value||'',
    plano:document.getElementById('f-plano')?.value||'',
    proximo:document.getElementById('f-prox')?.value||'',
    kpis,
  };
  showMsg('fill-msg','ok',isDraft?'Rascunho salvo!':'Semana enviada com sucesso! Dashboard atualizado.');
  if(!isDraft)setTimeout(()=>rdFill(),1500);
}
function showMsg(id,type,txt){const el=document.getElementById(id);if(el){el.innerHTML=`<div class="msg msg-${type==='ok'?'ok':'err'}">${txt}</div>`;setTimeout(()=>{if(el)el.innerHTML='';},4000);}}

        <input type="number" id="mg_${CW}_${area.id}_${k.id}" value="${mg[k.id]??''}" step="any" placeholder="Meta..." style="width:100%;padding:6px 8px;border:1.5px solid var(--lgray);border-radius:6px;font-size:13px;font-weight:700;color:var(--yd)">
      </div>`;
    });

  });

}
function saveMetas(){
  if(!METAS_GLOBAIS[CW])METAS_GLOBAIS[CW]={};
  AREAS.forEach(area=>{
    if(!METAS_GLOBAIS[CW][area.id])METAS_GLOBAIS[CW][area.id]={};
    KPIS.filter(k=>k.area===area.id&&k.active).forEach(k=>{
      const v=parseFloat(document.getElementById(`mg_${CW}_${area.id}_${k.id}`)?.value);
      if(!isNaN(v))METAS_GLOBAIS[CW][area.id][k.id]=v;
    });
  });
  showMsg('metas-msg','ok','Metas salvas com sucesso! Gerentes agora veem as metas ao preencher.');
}

    const mgr=USERS.find(u=>u.id===USERS.find(x=>x.area===area.id&&x.role==='manager')?.id);
    const areaUsers=USERS.filter(u=>u.area===area.id);
    h+=`<div class="card"><div style="height:4px;background:var(--y)"></div><div class="card-p">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:38px;height:38px;border-radius:50%;background:var(--y);display:flex;align-items:center;justify-content:center;font-size:19px">${area.icon}</div>
          <div><div style="font-size:15px;font-weight:800">${area.n}. ${area.name}</div></div>
        </div>
        <button class="btn btn-sm" onclick="openEditArea('${area.id}')"><i class="ti ti-edit" style="font-size:12px"></i></button>
      </div>
      <div style="font-size:12px;color:var(--gray)">
        <div style="margin-bottom:4px"><span style="font-weight:700">Gerente: </span>${areaUsers.find(u=>u.role==='manager')?.name||'—'}</div>
        <div><span style="font-weight:700">Usuários: </span>${areaUsers.length}</div>
      </div>
    </div></div>`;
  });
  h+=`</div>`;
  document.getElementById('p-areas').innerHTML=h;
}
function openEditArea(aid){
  const a=AREAS.find(x=>x.id===aid);if(!a)return;
  const mgrs=USERS.filter(u=>u.role==='manager');
  openModal(`Editar — ${a.name}`,`
    <div class="fg"><label>Nome da área</label><input id="ea-n" value="${a.name}"></div>
    <div class="fg"><label>Ícone (emoji)</label><input id="ea-ic" value="${a.icon}" style="font-size:20px;width:80px"></div>
    <div class="fg"><label>Gerente responsável</label><select id="ea-m"><option value="">— Selecionar —</option>${mgrs.map(u=>`<option value="${u.id}"${USERS.find(x=>x.area===aid&&x.role==='manager')?.id===u.id?' selected':''}>${u.name}</option>`).join('')}</select></div>
  `,[{l:'Salvar',y:true,fn:()=>{
    a.name=document.getElementById('ea-n').value;
    a.icon=document.getElementById('ea-ic').value;
    const newMgr=document.getElementById('ea-m').value;
    USERS.forEach(u=>{if(u.area===aid&&u.role==='manager')u.area=null;});
    if(newMgr){const u=USERS.find(x=>x.id===newMgr);if(u)u.area=aid;}
    closeModal();rdAreas();
  }},{l:'Cancelar',fn:closeModal}]);
}

// ============ KPIs MGMT ============
function rdKpisMgmt(){
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div><div class="page-title">Gerenciar KPIs</div><div class="page-sub">Indicadores de cada área</div></div>
    <button class="btn btn-y" onclick="openNewKpi()"><i class="ti ti-plus" style="font-size:14px"></i> Novo KPI</button>
  </div>`;
  AREAS.forEach(area=>{
    const ks=KPIS.filter(k=>k.area===area.id);
    h+=`<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:16px">${area.icon}</span><div style="font-size:13px;font-weight:800">${area.n}. ${area.name}</div>
        <span class="badge b-gray">${ks.filter(k=>k.active).length} ativos</span>
      </div>
      <div class="tbl-wrap"><table><thead><tr><th>KPI</th><th>Unidade</th><th>Tipo</th><th>Status</th><th style="text-align:right">Ações</th></tr></thead><tbody>`;
    ks.forEach(k=>{
      h+=`<tr><td style="font-weight:600">${k.name}</td><td style="color:var(--gray)">${k.unit}</td>
        <td><span class="badge ${k.type==='maior'?'b-blue':'b-yellow'}">${k.type==='maior'?'↑ maior melhor':'↓ menor melhor'}</span></td>
        <td><span class="badge ${k.active?'b-green':'b-gray'}">${k.active?'Ativo':'Inativo'}</span></td>
        <td style="text-align:right"><div style="display:flex;gap:5px;justify-content:flex-end">
          <button class="btn btn-sm" onclick="openEditKpi('${k.id}')"><i class="ti ti-edit" style="font-size:11px"></i> Editar</button>
          <button class="btn btn-sm ${k.active?'btn-red':''}" onclick="toggleKpi('${k.id}')">${k.active?'Desativar':'Ativar'}</button>
        </div></td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  });
  document.getElementById('p-kpis-mgmt').innerHTML=h;
}
function openNewKpi(){
  openModal('Novo KPI',`
    <div class="fg"><label>Área</label><select id="nk-a"><option value="">— Selecionar —</option>${AREAS.map(a=>`<option value="${a.id}">${a.n}. ${a.name}</option>`).join('')}</select></div>
    <div class="fg"><label>Nome do KPI</label><input id="nk-n" placeholder="Ex: SLA de atendimento (%)"></div>
    <div class="two-col"><div class="fg"><label>Unidade</label><input id="nk-u" placeholder="%"></div>
    <div class="fg"><label>Tipo</label><select id="nk-t"><option value="maior">↑ Quanto maior melhor</option><option value="menor">↓ Quanto menor melhor</option></select></div></div>
  `,[{l:'Criar KPI',y:true,fn:()=>{
    const a=document.getElementById('nk-a').value,n=document.getElementById('nk-n').value;
    if(!a||!n){alert('Preencha área e nome.');return;}
    KPIS.push({id:'k'+Date.now(),area:a,name:n,unit:document.getElementById('nk-u').value||'un',type:document.getElementById('nk-t').value,active:true});
    closeModal();rdKpisMgmt();
  }},{l:'Cancelar',fn:closeModal}]);
}
function openEditKpi(kid){
  const k=KPIS.find(x=>x.id===kid);if(!k)return;
  openModal('Editar KPI',`
    <div class="fg"><label>Nome</label><input id="ek-n" value="${k.name}"></div>
    <div class="two-col"><div class="fg"><label>Unidade</label><input id="ek-u" value="${k.unit}"></div>
    <div class="fg"><label>Tipo</label><select id="ek-t"><option value="maior"${k.type==='maior'?' selected':''}>↑ Quanto maior melhor</option><option value="menor"${k.type==='menor'?' selected':''}>↓ Quanto menor melhor</option></select></div></div>
  `,[{l:'Salvar',y:true,fn:()=>{k.name=document.getElementById('ek-n').value;k.unit=document.getElementById('ek-u').value;k.type=document.getElementById('ek-t').value;closeModal();rdKpisMgmt();}},{l:'Cancelar',fn:closeModal}]);
}
function toggleKpi(kid){const k=KPIS.find(x=>x.id===kid);if(k)k.active=!k.active;rdKpisMgmt();}

// ============ SETTINGS ============
function rdSettings(){
  let h=`<div class="page-title">Minha Conta</div><div class="page-sub">Edite suas informações e senha</div>
  <div id="settings-msg"></div>
  <div class="card" style="margin-bottom:14px;max-width:480px"><div class="card-p">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--lgray)">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--y);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900">${CU.av}</div>
      <div><div style="font-size:17px;font-weight:800">${CU.name}</div><div style="font-size:12px;color:var(--gray)">${CU.email}</div></div>
    </div>
    <div style="font-size:13px;font-weight:800;margin-bottom:12px">Dados pessoais</div>
    <div class="fg"><label>Nome completo</label><input id="s-n" value="${CU.name}"></div>
    <div class="fg"><label>E-mail</label><input id="s-e" type="email" value="${CU.email}"></div>
    <button class="btn btn-y" onclick="saveSettings()"><i class="ti ti-check" style="font-size:13px"></i> Salvar dados</button>
  </div></div>
  <div class="card" style="max-width:480px"><div class="card-p">
    <div style="font-size:13px;font-weight:800;margin-bottom:12px">Alterar senha</div>
    <div class="fg"><label>Senha atual</label><input id="s-op" type="password" placeholder="Senha atual"></div>
    <div class="fg"><label>Nova senha</label><input id="s-np" type="password" placeholder="Nova senha"></div>
    <div class="fg"><label>Confirmar senha</label><input id="s-cp" type="password" placeholder="Confirme a nova senha"></div>
    <button class="btn btn-y" onclick="savePw()"><i class="ti ti-key" style="font-size:13px"></i> Alterar senha</button>
  </div></div>`;
  document.getElementById('p-settings').innerHTML=h;
}
function saveSettings(){
  const n=document.getElementById('s-n').value;const e=document.getElementById('s-e').value;
  if(!n||!e){showMsg('settings-msg','err','Preencha nome e e-mail.');return;}
  CU.name=n;CU.email=e;CU.av=n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const u=USERS.find(x=>x.id===CU.id);if(u){u.name=n;u.email=e;u.av=CU.av;}
  document.getElementById('u-av').textContent=CU.av;document.getElementById('u-name').textContent=CU.name;
  showMsg('settings-msg','ok','Dados atualizados com sucesso!');
}
function savePw(){
  const op=document.getElementById('s-op').value;const np=document.getElementById('s-np').value;const cp=document.getElementById('s-cp').value;
  if(op!==CU.pw){showMsg('settings-msg','err','Senha atual incorreta.');return;}
  if(!np){showMsg('settings-msg','err','Informe a nova senha.');return;}
  if(np!==cp){showMsg('settings-msg','err','As novas senhas não conferem.');return;}
  CU.pw=np;const u=USERS.find(x=>x.id===CU.id);if(u)u.pw=np;
  showMsg('settings-msg','ok','Senha alterada com sucesso!');
  document.getElementById('s-op').value='';document.getElementById('s-np').value='';document.getElementById('s-cp').value='';
}

// ============ MODAL ============
function openModal(title,bodyHtml,btns){
  document.getElementById('modal-ct').innerHTML=`
  <div class="modal-overlay open" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-head"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">${bodyHtml}</div>
      <div class="modal-foot">${btns.map(b=>`<button class="btn ${b.y?'btn-y':''}" onclick="(${b.fn.toString()})()">${b.l}</button>`).join('')}</div>
    </div>
  </div>`;
}
function closeModal(){document.getElementById('modal-ct').innerHTML='';}
</script>
