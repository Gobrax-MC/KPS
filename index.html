<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gobrax · KPIs Semanais</title>
  <meta name="description" content="Sistema de gestão e apresentação de KPIs semanais — Gobrax Pós-Vendas" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css" />
  <!-- SheetJS for Excel export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app" id="app">

  <!-- ===== LOGIN ===== -->
  <div id="login-screen">
    <div class="login-wrap">
      <div class="login-left">
        <div>
          <div class="login-brand">
            <div class="sb-icon">G</div>
            <span class="login-brand-name">gobrax</span>
          </div>
          <div class="login-headline">KPIs<br>Semanais</div>
          <p class="login-desc">Gestão e apresentação de indicadores por área.</p>
        </div>
        <div class="login-footer">© 2025 Gobrax</div>
      </div>

      <div class="login-right">
        <div class="login-card">
          <h2>Bem-vindo</h2>
          <p class="login-sub">Entre com suas credenciais</p>
          <div id="login-err" class="msg msg-err" style="display:none"></div>
          <div class="fg">
            <label>E-mail</label>
            <input id="le" type="email" placeholder="seu@gobrax.com.br" />
          </div>
          <div class="fg">
            <label>Senha</label>
            <input id="lp" type="password" placeholder="••••••" />
          </div>
          <button class="btn btn-y btn-full" onclick="doLogin()">
            <i class="ti ti-login"></i> Entrar
          </button>
          <div class="quick-access">
            <div class="quick-label">Acesso rápido · senha: 123456</div>
            <div class="quick-grid">
              <button class="qbtn" onclick="ql('diretor@gobrax.com.br')">👑 Diretor</button>
              <button class="qbtn" onclick="ql('grandescontas@gobrax.com.br')">🏢 Gd. Contas</button>
              <button class="qbtn" onclick="ql('suprimentos@gobrax.com.br')">📦 Suprimentos</button>
              <button class="qbtn" onclick="ql('suporte@gobrax.com.br')">🎧 Suporte</button>
              <button class="qbtn" onclick="ql('cs@gobrax.com.br')">👥 CS</button>
              <button class="qbtn" onclick="ql('melhoria@gobrax.com.br')">📈 Melhoria</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app-screen" style="display:none; position:absolute; inset:0;">
    <div class="app-inner">

      <!-- Sidebar -->
      <aside class="sb">
        <div class="sb-logo">
          <div class="sb-brand">
            <div class="sb-icon">G</div>
            <div>
              <div class="sb-name">gobrax</div>
              <div class="sb-sub">KPIs Semanais</div>
            </div>
          </div>
        </div>
        <nav class="sb-nav" id="sb-nav"></nav>
        <div class="sb-user">
          <div class="sb-user-row">
            <div class="sb-av" id="u-av">--</div>
            <div>
              <div class="sb-uname" id="u-name">–</div>
              <div class="sb-urole" id="u-role">–</div>
            </div>
          </div>
          <button class="logout" onclick="doLogout()">← Sair</button>
        </div>
      </aside>

      <!-- Main content -->
      <div class="main">
        <div class="topbar">
          <div class="topbar-left">
            <span class="topbar-title" id="tb-title">Dashboard</span>
          </div>
          <div class="topbar-right">
            <select id="week-sel" onchange="CW=this.value;render()"></select>
            <button class="btn btn-y btn-sm" id="btn-kpis-week" onclick="nav('kpis-semanais')" style="display:none">
              <i class="ti ti-chart-bar"></i> KPIs Semanais
            </button>
            <button class="btn btn-sm no-print" id="btn-export-excel" onclick="exportExcel()" style="display:none" title="Exportar Excel">
              <i class="ti ti-table-export"></i>
            </button>
          </div>
        </div>

        <div class="content" id="main-ct">
          <div id="p-dashboard"    class="page"></div>
          <div id="p-kpis-semanais" class="page"></div>
          <div id="p-fill"         class="page"></div>
          <div id="p-metas"        class="page"></div>
          <div id="p-history"      class="page"></div>
          <div id="p-users"        class="page"></div>
          <div id="p-areas"        class="page"></div>
          <div id="p-kpis-mgmt"    class="page"></div>
          <div id="p-detail"       class="page"></div>
          <div id="p-settings"     class="page"></div>
        </div>
      </div>

    </div><!-- .app-inner -->
  </div><!-- #app-screen -->

  <!-- Modal portal -->
  <div id="modal-ct"></div>
  <!-- Print portal -->
  <div id="print-area" style="display:none"></div>

</div><!-- .app -->

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/helpers.js"></script>
<script src="js/auth.js"></script>
<script src="js/export.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/kpis-semanais.js"></script>
<script src="js/pages/fill.js"></script>
<script src="js/pages/metas.js"></script>
<script src="js/pages/history.js"></script>
<script src="js/pages/detail.js"></script>
<script src="js/pages/users.js"></script>
<script src="js/pages/areas.js"></script>
<script src="js/pages/kpis-mgmt.js"></script>
<script src="js/pages/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
